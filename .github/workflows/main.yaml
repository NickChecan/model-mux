name: main

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      API_KEY_OPENAI: ${{ secrets.API_KEY_OPENAI }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify

  release:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      released_version: ${{ steps.release_version.outputs.released_version }}
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture released version
        id: release_version
        run: |
          if [ -f .released-version ]; then
            echo "released_version=$(cat .released-version)" >> "$GITHUB_OUTPUT"
          else
            echo "released_version=" >> "$GITHUB_OUTPUT"
          fi

  smoke:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released_version != ''
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install model-mux@${{ needs.release.outputs.released_version }}
